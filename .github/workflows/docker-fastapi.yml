name: Build and Push FastAPI to Amazon ECR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'RAG/apps/fastapi/**'
      - 'RAG/shared/**'
      - '.github/workflows/docker-fastapi.yml'

env:
  AWS_REGION: ap-south-1

jobs:
  push-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push FastAPI Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t rag-fastapi \
            -f "RAG/apps/fastapi/Dockerfile" . \
            --load
          
          docker tag rag-fastapi:latest ${{ steps.login-ecr.outputs.registry }}/rag-fastapi:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/rag-fastapi:latest
